<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">

<title>Repeater</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
        --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        --yellow: #d29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text); padding: 16px; max-width: 960px; margin: 0 auto; }
header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
header h1 { font-size: 20px; }
.badge { font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: 600; }
.badge-idle { background: var(--green); color: #000; }
.badge-rx { background: var(--accent); color: #000; animation: pulse 1s infinite; }
.badge-tx { background: var(--yellow); color: #000; }
.badge-hang { background: var(--border); color: var(--text); }
.badge-timeout { background: var(--red); color: #000; }
.badge-off { background: var(--border); color: var(--dim); }
@keyframes pulse { 50% { opacity: 0.7; } }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.card h2 { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px;
           margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table td { padding: 3px 0; }
table td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.alert { padding: 6px 10px; border-left: 3px solid var(--red); margin-bottom: 6px;
         font-size: 12px; background: rgba(248,81,73,0.08); border-radius: 0 3px 3px 0; }
.alert.moderate { border-color: var(--yellow); background: rgba(210,153,34,0.08); }
.btn { padding: 5px 12px; border: 1px solid var(--border); background: var(--card);
       color: var(--text); border-radius: 5px; cursor: pointer; font-size: 12px;
       -webkit-tap-highlight-color: transparent; text-decoration: none; display: inline-block; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:active { background: rgba(88,166,255,0.12); border-color: var(--accent); color: var(--accent); }

/* iOS / mobile touch fixes */
@media (max-width: 600px) {
  body { padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  header { gap: 8px; margin-bottom: 10px; }
  header h1 { font-size: 16px; }
  header nav { margin-left: 0; width: 100%; justify-content: stretch; }
  header nav .btn { flex: 1; text-align: center; min-height: 44px; display: flex;
                    align-items: center; justify-content: center; padding: 8px 6px; }
  .btn { min-height: 44px; padding: 10px 12px; font-size: 13px; }
}

/* iOS range slider styling */
input[type="range"] { -webkit-appearance: none; appearance: none; height: 36px;
                       background: transparent; }
input[type="range"]::-webkit-slider-runnable-track { height: 6px; background: var(--border);
                                                      border-radius: 3px; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px;
                                             background: var(--accent); border-radius: 50%;
                                             margin-top: -9px; }

/* Bulletin card */
#bulletin-body h1 { font-size: 18px; margin: 8px 0 6px; }
#bulletin-body h2 { font-size: 16px; margin: 8px 0 6px; }
#bulletin-body h3 { font-size: 14px; margin: 8px 0 6px; }
#bulletin-body h4, #bulletin-body h5, #bulletin-body h6 { font-size: 13px; margin: 6px 0 4px; }
#bulletin-body p { margin: 6px 0; }
#bulletin-body ul { margin: 6px 0 6px 22px; }
#bulletin-body a { color: var(--accent); }
#bulletin-body code { background: var(--border); padding: 1px 5px; border-radius: 3px;
                       font-family: ui-monospace, monospace; font-size: 12px; }
#bulletin-body blockquote { border-left: 3px solid var(--border); padding: 4px 10px;
                             color: var(--dim); margin: 6px 0; }
</style>
<script src="/md.js"></script>
</head>
<body>
<header>
  <h1 id="callsign">Repeater</h1>
  <span id="state-badge" class="badge badge-idle">IDLE</span>
  <span id="tx-badge" class="badge badge-off" title="Kerchunk transmitting">TX idle</span>
  <span id="ptt-badge" class="badge badge-off">PTT off</span>
  <nav style="margin-left:auto;display:flex;gap:8px">
    <a href="index.html" class="btn" style="border-color:var(--accent);color:var(--accent)">Public</a>
    <a href="register.html" class="btn" id="register-link" style="display:none">Register</a>
  </nav>
</header>

<!-- Bulletin (hidden when empty) -->
<div class="card" id="bulletin-card" style="display:none;margin-bottom:12px">
  <h2 id="bulletin-heading">Announcements</h2>
  <div id="bulletin-body" style="font-size:14px;line-height:1.5"></div>
</div>

<div class="grid">
  <!-- Repeater Info -->
  <div class="card">
    <h2>Repeater Info</h2>
    <table id="station-table">
      <tr><td>Loading...</td></tr>
    </table>
  </div>

  <!-- Live Audio -->
  <div class="card">
    <h2>Live Audio</h2>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn" id="audio-btn" onclick="toggleAudio()">Listen</button>
      <span id="audio-status" style="font-size:12px;color:var(--dim)">Stopped</span>
      <span id="audio-dir" class="badge badge-off" style="display:none">--</span>
    </div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
      <label style="font-size:11px;color:var(--dim)">Volume</label>
      <input type="range" id="audio-vol" min="0" max="100" value="80"
             style="flex:1" oninput="setAudioVolume(this.value)">
    </div>
    <table id="stream-table" style="margin-top:10px">
      <tr><td colspan="2" style="color:var(--dim)">No data</td></tr>
    </table>
  </div>

  <!-- Weather -->
  <div class="card">
    <h2>Current Weather</h2>
    <table id="wx-table"><tr><td colspan="2" style="color:var(--dim)">No data</td></tr></table>
    <h2 style="margin-top:10px">Forecast</h2>
    <table id="fc-table"><tr><td colspan="2" style="color:var(--dim)">No data</td></tr></table>
  </div>

  <!-- NWS Alerts -->
  <div class="card">
    <h2>NWS Alerts</h2>
    <div id="alerts" style="font-size:12px">None</div>
  </div>

  <!-- Coverage Map (shown if coverage.png exists) -->
  <div class="card" id="coverage-card" style="display:none">
    <h2>Coverage Map</h2>
    <img id="coverage-img" src="coverage.png" alt="Coverage Map"
         style="width:100%;border-radius:4px;cursor:pointer"
         onclick="openCoverageOverlay()"
         onerror="this.parentElement.style.display='none'"
         onload="this.parentElement.style.display=''">
  </div>
</div>

<!-- Coverage fullscreen overlay -->
<div id="coverage-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;cursor:pointer;justify-content:center;align-items:center"
     onclick="closeCoverageOverlay()">
  <img id="coverage-overlay-img" style="max-width:95vw;max-height:95vh;border-radius:6px;box-shadow:0 0 40px rgba(0,0,0,0.5)">
  <div style="position:fixed;top:16px;right:24px;font-size:28px;color:#fff;cursor:pointer;font-weight:300">&times;</div>
</div>

<script>
(function(){
'use strict';

function tr(k,v) { return '<tr><td>'+k+'</td><td>'+v+'</td></tr>'; }

/* ── State + PTT badges ── */
/* Map a repeater state name to a badge CSS class. Must stay in sync with
 * admin/index.html's stateBadgeClass — five real states from mod_repeater:
 *   IDLE       — green, reset and ready
 *   RECEIVING  — pulsing blue, user keyed up
 *   TAIL_WAIT  — yellow, PTT still held for the relay tail
 *   HANG_WAIT  — grey, PTT released but hang timer counting
 *   TIMEOUT    — red, TOT fault */
function stateBadgeClass(state) {
  return (
    state === 'IDLE'        ? 'badge-idle'    :
    state === 'RECEIVING'   ? 'badge-rx'      :
    state === 'TAIL_WAIT'   ? 'badge-tx'      :
    state === 'HANG_WAIT'   ? 'badge-hang'    :
    state === 'RX_TIMEOUT'  ? 'badge-timeout' :
    'badge-tx');
}

/* Minimalist TX indicator for the public page — "TX active" whenever
 * the repeater is transmitting (any TX state other than IDLE),
 * "TX idle" otherwise. No phase breakdown; that belongs on the admin
 * dashboard. Driven entirely by the backend 'status' snapshot +
 * 'tx_state_change' SSE events — no client-side synthesis. */
function updateTxIndicator(txstate) {
  const b = document.getElementById('tx-badge');
  if (!b) return;
  const active = typeof txstate === 'string' && txstate !== 'TX_IDLE';
  b.textContent = active ? 'TX ' + txstate.replace(/^TX_/, '').toLowerCase()
                         : 'TX idle';
  b.className = 'badge ' + (active ? 'badge-tx' : 'badge-off');
}

function updateState(state) {
  const b = document.getElementById('state-badge');
  b.textContent = state;
  b.className = 'badge ' + stateBadgeClass(state);
  /* Audio frames only flow during RECEIVING (RX tap) and TAIL_WAIT (TX
   * tap, relay tail). In IDLE / HANG_WAIT / TIMEOUT the stream is
   * silent, so clear the stale RX/TX direction chip on the Live Audio
   * card. */
  if (state === 'IDLE' || state === 'HANG_WAIT' || state === 'RX_TIMEOUT') {
    audioLastDir = -1;
    const dir = document.getElementById('audio-dir');
    if (dir) dir.style.display = 'none';
  }
}

function updatePTT(on) {
  const b = document.getElementById('ptt-badge');
  b.textContent = on ? 'PTT on' : 'PTT off';
  b.className = 'badge ' + (on ? 'badge-tx' : 'badge-off');
}

/* ── Station info ── */
async function refreshStation() {
  try {
    const d = await (await fetch('/api/status')).json();
    const name = d.name || d.callsign || 'Repeater';
    document.getElementById('callsign').textContent = name;
    document.title = name + (d.callsign && d.name ? ' (' + d.callsign + ')' : ' Repeater');
    let h = '';
    if (d.name) h += tr('Name', d.name);
    if (d.callsign) h += tr('Callsign', d.callsign);
    if (d.frequency) h += tr('Frequency', d.frequency + ' MHz');
    if (d.offset) h += tr('Offset', d.offset + ' MHz');
    if (d.tone) h += tr('Tone', d.tone);
    if (d.address) h += tr('Address', d.address);
    if (d.latitude && d.longitude) h += tr('Coordinates', d.latitude + ', ' + d.longitude);
    if (d.elevation) h += tr('Elevation', d.elevation + ' ft ASL');
    document.getElementById('station-table').innerHTML = h || '<tr><td>No data</td></tr>';
    if (d.registration_enabled)
      document.getElementById('register-link').style.display = '';
  } catch(e) {}
}

/* ── Status fetch (bootstrap + SSE resync only) ──
 * This replaces the previous 5s poll. Live state is driven by the SSE
 * stream; /api/status is only hit on page load and after an SSE
 * disconnect so we resync against whatever transitions we missed. */
let streamServerStats = {};
async function refreshStatus() {
  try {
    const d = await (await fetch('/api/status')).json();
    /* State fields (rx_state, tx_state, ptt, cor) come via the SSE
     * 'status' snapshot — don't set them here. This call only feeds
     * non-state dashboard items (stream stats). */
    streamServerStats = {
      listeners:   d.audio_listeners,
      sampleRate:  d.audio_sample_rate,
      bitrateKbps: d.audio_bitrate_kbps
    };
    renderStreamTable();
  } catch(e) {}
}

/* ── Stream card ── */
let streamWorkerStats = null;  /* set only while playing */
function renderStreamTable() {
  const t = document.getElementById('stream-table');
  const s = streamServerStats;
  let h = '';
  if (s.listeners !== undefined)
    h += tr('Listeners', s.listeners);
  if (s.sampleRate)
    h += tr('Sample rate', s.sampleRate + ' Hz');
  if (s.bitrateKbps)
    h += tr('Bitrate', s.bitrateKbps + ' kbps');
  if (streamWorkerStats) {
    const w = streamWorkerStats;
    const bufMs = Math.round(w.avail / s.sampleRate * 1000) || 0;
    h += tr('Buffer', bufMs + ' ms' + (w.primed ? '' : ' (priming)'));
    if (w.underruns > 0)
      h += tr('Underruns', w.underruns);
  }
  t.innerHTML = h || '<tr><td colspan="2" style="color:var(--dim)">No data</td></tr>';
}

/* ── Weather / NWS ──
 * Pushed via SSE (weather_updated, nws_updated). Snapshot-on-connect
 * delivers current values to each new SSE client — no HTTP polling. */
function renderWeather(d) {
  if (!d) return;
  const wt = document.getElementById('wx-table');
  const ft = document.getElementById('fc-table');
  if (d.valid) {
    let h = '';
    h += tr('Condition', d.condition || '\u2014');
    h += tr('Temperature', Math.round(d.temp_f) + '\u00b0F');
    h += tr('Wind', d.wind_dir + ' ' + Math.round(d.wind_mph) + ' mph');
    h += tr('Humidity', d.humidity + '%');
    wt.innerHTML = h;
  }
  if (d.forecast_high_f !== undefined) {
    let h = '';
    h += tr('High / Low', Math.round(d.forecast_high_f) + '\u00b0 / ' + Math.round(d.forecast_low_f) + '\u00b0F');
    if (d.forecast_rain_pct > 0) h += tr('Rain', d.forecast_rain_pct + '%');
    if (d.forecast_snow_pct > 0) h += tr('Snow', d.forecast_snow_pct + '%');
    h += tr('Humidity', d.forecast_humidity + '%');
    ft.innerHTML = h;
  }
}

function renderAlerts(d) {
  const el = document.getElementById('alerts');
  if (!d || !d.alerts || d.alerts.length === 0) { el.textContent = 'None'; return; }

  const esc = function(s) {
    if (!s) return '';
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML.replace(/\n/g, '<br>');
  };
  const fmtTime = function(unix) {
    if (!unix) return '';
    return new Date(unix * 1000).toLocaleString();
  };

  el.innerHTML = d.alerts.map(function(a) {
    const sevClass = (a.severity === 'MODERATE' || a.severity === 'MINOR')
                     ? ' moderate' : '';
    let h = '<div class="alert' + sevClass + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap">';
    h += '<div><strong>' + esc(a.event) + '</strong> <span style="opacity:0.8;font-size:11px">[' + esc(a.severity) + ']</span></div>';
    if (a.sender) h += '<div style="font-size:11px;opacity:0.7">' + esc(a.sender) + '</div>';
    h += '</div>';
    if (a.headline)  h += '<div style="margin-top:4px;font-size:12px">' + esc(a.headline) + '</div>';
    if (a.area_desc) h += '<div style="margin-top:4px;font-size:11px;opacity:0.85"><em>Area:</em> ' + esc(a.area_desc) + '</div>';
    if (a.effective || a.expires) {
      h += '<div style="margin-top:4px;font-size:11px;opacity:0.7">';
      if (a.effective) h += '<em>Effective:</em> ' + fmtTime(a.effective);
      if (a.effective && a.expires) h += ' &middot; ';
      if (a.expires)   h += '<em>Expires:</em> ' + fmtTime(a.expires);
      h += '</div>';
    }
    if (a.description) {
      h += '<details style="margin-top:6px">';
      h += '<summary style="cursor:pointer;font-size:12px;opacity:0.85">Full text</summary>';
      h += '<div style="margin-top:6px;font-size:12px;line-height:1.45">' + esc(a.description) + '</div>';
      if (a.instruction) {
        h += '<div style="margin-top:8px;padding:6px 8px;background:rgba(210,153,34,0.08);border-left:2px solid #d29922;font-size:12px;line-height:1.45">';
        h += '<strong>Instructions:</strong><br>' + esc(a.instruction);
        h += '</div>';
      }
      h += '</details>';
    }
    h += '</div>';
    return h;
  }).join('');
}

/* ── Live Audio ── */
let audioCtx = null, audioGain = null, audioNode = null;
let audioWs = null, audioLastDir = -1;

/* ── Live state via SSE ──
 * /api/events is the single source of truth for RX state and PTT. The
 * server fires KERCHEVT_STATE_CHANGE on every mod_repeater transition
 * so we mirror evt.new_state directly into the state badge — no
 * guessing, no synthetic labels, no per-event refreshStatus. We only
 * hit /api/status on (1) page bootstrap, (2) SSE open/reopen so we
 * pick up any transitions that happened while we were disconnected. */
let sseEvents = null;
let sseConnected = false;
function connectSSE() {
  try {
    if (sseEvents) { try { sseEvents.close(); } catch(_) {} }
    sseEvents = new EventSource('/api/events');
    sseEvents.onopen = function() {
      /* Fresh stream — resync against current truth. Also covers the
       * initial connect; subsequent onopen fires after auto-reconnect. */
      sseConnected = true;
      refreshStatus();
    };
    sseEvents.onmessage = function(ev) {
      let e; try { e = JSON.parse(ev.data); } catch(_) { return; }
      switch (e.type) {
        case 'status': {
          /* Authoritative snapshot from the daemon. First message on
           * every SSE connect + republished on every state-affecting
           * event. Source of truth for rx/tx/ptt; no synthesis. */
          const s = e.data || {};
          if (typeof s.rx_state === 'string') updateState(s.rx_state);
          if (typeof s.tx_state === 'string') updateTxIndicator(s.tx_state);
          if (typeof s.ptt === 'boolean') updatePTT(s.ptt);
          break;
        }
        case 'rx_state_change':
          updateState(e.new_state);
          break;
        case 'tx_state_change':
          updateTxIndicator(e.new_state);
          break;
        case 'ptt_assert':
          updatePTT(true);
          break;
        case 'ptt_drop':
          updatePTT(false);
          /* Also clear the RX/TX direction chip — for announcements
           * (CW ID, TTS, parrot) the repeater state stays IDLE the
           * whole time, so no state_change fires to clean it up. */
          audioLastDir = -1;
          { const dir = document.getElementById('audio-dir');
            if (dir) dir.style.display = 'none'; }
          break;
        case 'bulletin_updated':
          renderBulletin(e.data);
          break;
        case 'weather_updated':
          renderWeather(e.data);
          break;
        case 'nws_updated':
          renderAlerts(e.data);
          break;
        case 'shutdown':
          updateState('IDLE');
          updatePTT(false);
          break;
      }
    };
    sseEvents.onerror = function() {
      /* EventSource auto-reconnects with its own backoff. When it
       * succeeds, onopen fires and resyncs via refreshStatus. Just
       * mark as disconnected so we don't act on stale state. */
      sseConnected = false;
    };
  } catch(_) {}
}

window.toggleAudio = function() {
  if (audioWs) { stopAudio(); return; }
  startAudio();
};

async function startAudio() {
  try {
    audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    audioGain = audioCtx.createGain();
    audioGain.gain.value = document.getElementById('audio-vol').value / 100;
    audioGain.connect(audioCtx.destination);

    await audioCtx.audioWorklet.addModule('stream-processor.js');

    audioNode = new AudioWorkletNode(audioCtx, 'stream-processor', {
      processorOptions: { sampleRate: 48000 }
    });
    audioNode.connect(audioGain);
    audioNode.port.onmessage = function(e) {
      if (e.data && e.data.type === 'stats') {
        streamWorkerStats = e.data;
        document.getElementById('audio-status').textContent =
          streamWorkerStats.primed ? 'Playing' : 'Buffering';
        renderStreamTable();
      }
    };

    audioLastDir = -1;
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var url = proto + '//' + location.host + '/api/audio';
    audioWs = new WebSocket(url);
    audioWs.binaryType = 'arraybuffer';
    audioWs.onopen = function() {
      document.getElementById('audio-btn').textContent = 'Stop';
      document.getElementById('audio-status').textContent = 'Listening...';
    };
    audioWs.onclose = function() { stopAudio(); };
    audioWs.onerror = function() { stopAudio(); };
    audioWs.onmessage = function(ev) {
      var ab = ev.data;
      if (ab.byteLength < 4) return;
      var hdr = new Uint8Array(ab, 0, 2);
      if (hdr[0] !== 0x01) return;
      if (hdr[1] !== audioLastDir) {
        audioLastDir = hdr[1];
        var badge = document.getElementById('audio-dir');
        badge.style.display = '';
        badge.textContent = audioLastDir === 0 ? 'RX' : 'TX';
        badge.className = 'badge ' + (audioLastDir === 0 ? 'badge-rx' : 'badge-tx');
      }
      var pcm = new Int16Array(ab, 4);
      var f = new Float32Array(pcm.length);
      for (var i = 0; i < pcm.length; i++) f[i] = pcm[i] / 32768.0;
      audioNode.port.postMessage(f, [f.buffer]);
    };
  } catch(err) {
    document.getElementById('audio-status').textContent = 'Error: ' + err.message;
  }
}

function stopAudio() {
  if (audioWs) { audioWs.close(); audioWs = null; }
  if (audioNode) { audioNode.disconnect(); audioNode = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  audioGain = null; audioLastDir = -1;
  streamWorkerStats = null;
  renderStreamTable();
  document.getElementById('audio-btn').textContent = 'Listen';
  document.getElementById('audio-status').textContent = 'Stopped';
  document.getElementById('audio-dir').style.display = 'none';
}

window.setAudioVolume = function(v) {
  if (audioGain) audioGain.gain.value = v / 100;
};

/* ── Bulletin ──
 * Driven by the bulletin_updated SSE event (see connectSSE). The server
 * seeds the snapshot cache at startup and pushes updates on every admin
 * edit, so this page never polls /api/bulletin. */
function renderBulletin(d) {
  const card = document.getElementById('bulletin-card');
  const body = document.getElementById('bulletin-body');
  if (!d || !d.text || d.empty) {
    card.style.display = 'none';
    return;
  }
  body.innerHTML = window.renderMarkdown(d.text);
  card.style.display = '';
}

/* ── Init ── */
refreshStation();
/* Everything else — state, PTT, bulletin, weather, alerts — comes in
 * via SSE. connectSSE's onopen calls refreshStatus for state/PTT
 * bootstrap, and the snapshot-on-connect burst delivers the current
 * weather, alerts, and bulletin. No HTTP polling. */
connectSSE();

window.openCoverageOverlay = function() {
  document.getElementById('coverage-overlay-img').src=document.getElementById('coverage-img').src;
  document.getElementById('coverage-overlay').style.display='flex';
};
window.closeCoverageOverlay = function() {
  document.getElementById('coverage-overlay').style.display='none';
};
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') window.closeCoverageOverlay();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
})();
</script>
</body>
</html>
