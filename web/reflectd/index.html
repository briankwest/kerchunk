<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>kerchunk-reflectd — Roster</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
        --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        --yellow: #d29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text); padding: 16px;
       max-width: 1400px; margin: 0 auto; }
header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
header h1 { font-size: 20px; }
header nav { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; width: 100%; }
header nav .btn { text-decoration: none; white-space: nowrap; flex: 1; text-align: center;
                  padding: 5px 10px; }
header .sub { color: var(--dim); font-size: 14px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
        padding: 14px; margin-bottom: 12px; }
.card h2 { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px;
           margin-bottom: 10px; }
.btn { padding: 5px 12px; border: 1px solid var(--border); background: var(--card);
       color: var(--text); border-radius: 5px; cursor: pointer; font-size: 12px;
       text-decoration: none; display: inline-block; font-family: inherit; }
.btn:hover  { border-color: var(--accent); color: var(--accent); }
.btn-warn { border-color: var(--yellow); color: var(--yellow); }
.btn-red  { border-color: var(--red); color: var(--red); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
th { color: var(--dim); font-size: 11px; text-transform: uppercase;
     letter-spacing: 1px; font-weight: 600; }
td.num { font-variant-numeric: tabular-nums; text-align: right; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.dot.green  { background: var(--green); }
.dot.red    { background: var(--red); }
.dot.yellow { background: var(--yellow); }
.talker { color: var(--accent); font-weight: 600; }
.talker.idle { color: var(--dim); font-style: italic; font-weight: 400; }
.muted { color: var(--yellow); }
.sub2  { color: var(--dim); font-size: 11px; }
.status { font-size: 12px; color: var(--dim); }
.status.ok  { color: var(--green); }
.status.err { color: var(--red); }
.live { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: var(--green); margin-right: 4px; vertical-align: middle;
        animation: pulse 2s infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }

@media (max-width: 600px) {
  body { padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  header { gap: 8px; margin-bottom: 10px; }
  header h1 { font-size: 16px; }
  header nav .btn { min-height: 36px; display: flex;
                    align-items: center; justify-content: center; }
  .btn { min-height: 44px; padding: 10px 12px; font-size: 13px; }
  table { font-size: 11px; }
  th, td { padding: 4px 6px; }
}
</style>
</head>
<body>

<header>
  <h1>kerchunk-reflectd</h1>
  <span class="sub">Repeater linking reflector</span>
  <nav>
    <a href="/admin/" class="btn" style="border-color:var(--accent);color:var(--accent)">Roster</a>
    <a href="/admin/recordings.html" class="btn">Recordings</a>
    <a href="/admin/config.html" class="btn">Config</a>
  </nav>
</header>

<div class="card">
  <h2>Reflector</h2>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span id="meta">—</span>
    <button class="btn" onclick="reloadConfig()" title="Re-read reflectd.conf, push tg_membership_changed, reload TLS material">Reload config</button>
    <button class="btn btn-warn" onclick="pruneNow()" title="Run recordings_prune() now (instead of waiting for the hourly tick)">Prune recordings now</button>
    <span style="margin-left:auto" class="status" id="status"><span class="live"></span>connecting…</span>
  </div>
  <div class="status" id="meta2" style="margin-top:6px"></div>
</div>

<div class="card">
  <h2>Nodes</h2>
  <table>
    <thead><tr>
      <th></th><th>Node ID</th><th>State</th><th>TG</th>
      <th class="num">Uptime</th>
      <th class="num">RX pkts</th><th class="num">TX pkts</th>
      <th class="num">RX bytes</th><th class="num">TX bytes</th>
      <th class="num">Holds</th><th class="num">Talk time</th>
      <th class="num">Loss%</th>
      <th>Actions</th>
    </tr></thead>
    <tbody id="nodes"><tr><td colspan="13">loading…</td></tr></tbody>
  </table>
</div>

<div class="card">
  <h2>Talkgroups</h2>
  <table>
    <thead><tr>
      <th>TG</th><th>Name</th><th class="num">Members</th><th>Talker</th>
      <th class="num">For</th><th>Actions</th>
    </tr></thead>
    <tbody id="tgs"><tr><td colspan="6">—</td></tr></tbody>
  </table>
</div>

<script>
const $ = id => document.getElementById(id);
function setStatus(html) { $('status').innerHTML = html; }

function fmtUptime(s) {
    if (!s) return '—';
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d) return `${d}d ${h}h ${m}m`;
    if (h) return `${h}h ${m}m ${sec}s`;
    if (m) return `${m}m ${sec}s`;
    return `${sec}s`;
}
function fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b / 1024).toFixed(1) + ' KB';
    if (b < 1024*1024*1024) return (b / (1024*1024)).toFixed(1) + ' MB';
    return (b / (1024*1024*1024)).toFixed(2) + ' GB';
}
function fmtTalk(s) {
    if (!s) return '—';
    if (s < 60) return s.toFixed(1) + 's';
    const m = Math.floor(s / 60), sec = (s % 60).toFixed(0);
    return `${m}m ${sec}s`;
}

function fmtRelative(epochSec, nowSec) {
    if (!epochSec) return 'never';
    const ago = Math.max(0, nowSec - epochSec);
    if (ago < 60)    return ago + 's ago';
    if (ago < 3600)  return Math.floor(ago / 60) + 'm ago';
    if (ago < 86400) return Math.floor(ago / 3600) + 'h ago';
    return Math.floor(ago / 86400) + 'd ago';
}

function render(d) {
    $('meta').innerHTML =
        `<b>${d.reflector}</b> &middot; keepalive ${d.keepalive_s}s &middot; ` +
        `hangtime ${d.hangtime_ms}ms &middot; recording ` +
        (d.recording_enabled ? '<span style="color:var(--green)">on</span>'
                             : '<span style="color:var(--dim)">off</span>');
    $('meta2').textContent =
        `up ${fmtRelative(d.started_at, d.now)} · ` +
        `last reload ${fmtRelative(d.last_reload_at, d.now)} ` +
        `(${d.reload_count || 0}× since boot)`;
    setStatus(`<span class="live"></span>live (${new Date(d.now*1000).toLocaleTimeString()})`);

    $('nodes').innerHTML = (d.nodes || []).map(n => {
        const stateLbl = !n.connected ? 'offline'
            : n.muted ? `<span class="muted">muted</span>`
            : 'connected';
        const dotClass = !n.connected ? 'red' : n.muted ? 'yellow' : 'green';
        return `
        <tr>
          <td><span class="dot ${dotClass}"></span></td>
          <td>${n.id}<br><span class="sub2">${n.client_version || ''}</span></td>
          <td>${stateLbl}${n.mute_reason
                ? `<br><span class="sub2">${n.mute_reason}</span>` : ''}</td>
          <td class="num">${n.tg || '—'}</td>
          <td class="num">${fmtUptime(n.uptime_s)}</td>
          <td class="num">${n.rtp_in.toLocaleString()}</td>
          <td class="num">${n.rtp_out.toLocaleString()}</td>
          <td class="num">${fmtBytes(n.bytes_in)}</td>
          <td class="num">${fmtBytes(n.bytes_out)}</td>
          <td class="num">${n.floor_holds}</td>
          <td class="num">${fmtTalk(n.floor_seconds)}</td>
          <td class="num">${n.last_loss_pct.toFixed(1)}</td>
          <td>
            ${n.connected ?
                (n.muted
                    ? `<button class="btn" onclick="act('unmute','${n.id}')">Unmute</button>`
                    : `<button class="btn btn-warn" onclick="act('mute','${n.id}')">Mute</button>`)
              : ''}
            ${n.connected ? `<button class="btn btn-red" onclick="act('kick','${n.id}')">Kick</button>` : ''}
          </td>
        </tr>`;
    }).join('') || '<tr><td colspan="13">no nodes configured</td></tr>';

    $('tgs').innerHTML = (d.talkgroups || []).map(t => `
        <tr>
          <td class="num">${t.tg}</td>
          <td>${t.name}</td>
          <td class="num">${t.members}</td>
          <td>${t.talker
              ? `<span class="talker">${t.talker}</span>`
              : `<span class="talker idle">(idle)</span>`}</td>
          <td class="num">${t.talker ? (t.talker_for_ms / 1000).toFixed(1) + 's' : '—'}</td>
          <td>
            ${t.talker ? `<button class="btn btn-warn" onclick="release(${t.tg})">Release floor</button>` : ''}
          </td>
        </tr>`).join('') || '<tr><td colspan="6">no talkgroups</td></tr>';
}

async function act(action, node_id) {
    const body = { node_id };
    if (action === 'mute') body.retry_in_s = 60;
    if (action === 'kick') body.reason = 'admin from dashboard';
    await fetch('/api/admin/' + action, {
        method: 'POST', credentials: 'same-origin',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
}
async function release(tg) {
    await fetch('/api/admin/release-floor', {
        method: 'POST', credentials: 'same-origin',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ tg })
    });
}

async function reloadConfig() {
    const r = await fetch('/api/admin/reload', {
        method: 'POST', credentials: 'same-origin'
    });
    setStatus(r.ok ? `<span class="live"></span>config reload queued`
                   : `<span class="live" style="background:var(--red)"></span>${r.statusText}`);
}

async function pruneNow() {
    const r = await fetch('/api/admin/prune-now', {
        method: 'POST', credentials: 'same-origin'
    });
    if (!r.ok) { setStatus('prune failed: ' + r.statusText); return; }
    const j = await r.json();
    setStatus(`<span class="live"></span>pruned ${j.removed} item(s)`);
}

/* SSE-driven — reflectd pushes a fresh state snapshot on every change
 * AND once per second for live counter updates. No polling. */
function subscribe() {
    const es = new EventSource('/api/events', { withCredentials: true });
    es.onmessage = (ev) => { try { render(JSON.parse(ev.data)); } catch (_) {} };
    es.onerror = () => {
        setStatus('<span class="live" style="background:var(--red)"></span>reconnecting…');
        es.close();
        setTimeout(subscribe, 2000);
    };
}
subscribe();
</script>
</body>
</html>
