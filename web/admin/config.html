<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<title>Kerchunk Configuration</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
        --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        --yellow: #d29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text); padding: 16px;
       max-width: 1400px; margin: 0 auto; }
header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
header h1 { font-size: 20px; }
header nav { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; width: 100%; }
header nav .btn { text-decoration: none; white-space: nowrap; flex: 1; text-align: center;
                  padding: 5px 10px; }
header .sub { color: var(--dim); font-size: 14px; }
.btn { padding: 5px 12px; border: 1px solid var(--border); background: var(--card);
       color: var(--text); border-radius: 5px; cursor: pointer; font-size: 12px;
       text-decoration: none; display: inline-block; -webkit-tap-highlight-color: transparent; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:active { background: rgba(88,166,255,0.12); border-color: var(--accent); color: var(--accent); }
.btn-green { border-color: var(--green); color: var(--green); }
.btn-green:hover { background: rgba(63,185,80,0.15); }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@media (max-width: 1100px) { .grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.card h2 { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px;
           margin-bottom: 10px; }
.form-group { margin-bottom: 8px; }
.form-group label { display: block; font-size: 11px; color: var(--dim); text-transform: uppercase;
                    letter-spacing: 0.5px; margin-bottom: 3px; }
.form-group input, .form-group select { width: 100%; padding: 6px 8px; background: var(--bg);
                                         border: 1px solid var(--border); border-radius: 5px;
                                         color: var(--text); font-size: 13px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.form-group input:disabled { opacity: 0.5; cursor: not-allowed; }
.form-group .field-note { font-size: 10px; color: var(--yellow); margin-top: 2px; }
.toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.toggle-row label { font-size: 12px; color: var(--text); cursor: pointer; }
.toggle-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.card-footer { margin-top: 12px; display: flex; justify-content: flex-end; }

/* Toast notification */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border);
         border-radius: 5px; padding: 10px 16px; font-size: 13px; z-index: 2000;
         transition: opacity 0.3s; opacity: 0; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { border-color: var(--red); color: var(--red); }
.toast.success { border-color: var(--green); color: var(--green); }

.auth-error { text-align: center; padding: 40px; color: var(--red); font-size: 14px; }

/* iOS / mobile touch fixes */
@media (max-width: 600px) {
  body { padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  header { gap: 8px; margin-bottom: 10px; }
  header h1 { font-size: 16px; }
  header nav .btn { min-height: 36px; display: flex;
                    align-items: center; justify-content: center; }
  .btn { min-height: 44px; padding: 10px 12px; font-size: 13px; }
  .form-group input, .form-group select { min-height: 44px; font-size: 16px; }
  .toggle-row { min-height: 44px; }
  .toggle-row input[type="checkbox"] { width: 20px; height: 20px; }
  .card-footer .btn { width: 100%; display: flex; justify-content: center; }
}
</style>
</head>
<body>

<header>
  <h1>Configuration</h1>
  <nav>
    <a href="/admin/" class="btn">Admin</a>
    <a href="/admin/users.html" class="btn">Users</a>
    <a href="/admin/cdr.html" class="btn">CDR</a>
    <a href="/admin/config.html" class="btn" style="border-color:var(--accent);color:var(--accent)">Config</a>
    <a href="/admin/coverage.html" class="btn">Coverage</a>
    <a href="/admin/ptt.html" class="btn">PTT</a>
    <a href="/admin/link.html" class="btn">Link</a>
    <a href="https://github.com/briankwest/kerchunk/issues" class="btn" target="_blank" rel="noopener" title="Issues"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
  </nav>
</header>

<div id="auth-error" class="auth-error" style="display:none"></div>
<div class="grid" id="config-grid"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// Config metadata
// ============================================================
const SECTION_ORDER = [
  'general','audio','hid','repeater','courtesy','caller','dtmf','voicemail',
  'weather','time','nws','emergency','recording','cdr','parrot','tts','asr',
  'scrambler','otp','gpio','logger','stats','webhook','web',
  'freeswitch','sdr','pocsag','flex','aprs','poc','modules'
];

const SECTION_NAMES = {
  general:'General', audio:'Audio Device', hid:'HID Interface', repeater:'Repeater',
  courtesy:'Courtesy Tone', caller:'Caller ID', dtmf:'DTMF Processing', voicemail:'Voicemail',
  weather:'Weather', time:'Time', nws:'NWS Alerts', emergency:'Emergency',
  recording:'Recording', cdr:'CDR Logging', parrot:'Parrot / Echo', tts:'Text-to-Speech',
  asr:'Speech Recognition', scrambler:'Voice Scrambler', otp:'OTP Auth',
  gpio:'GPIO Control', logger:'Event Logger', stats:'Statistics',
  webhook:'Webhooks', web:'Web Dashboard', freeswitch:'AutoPatch (FreeSWITCH)',
  sdr:'SDR Monitor', pocsag:'POCSAG Paging', flex:'FLEX Paging',
  aprs:'APRS', poc:'PoC Radio Bridge', modules:'Modules'
};

const TOGGLE_KEYS = new Set([
  'preemphasis','software_relay','require_identification','enabled',
  'auto_announce','announce_temp','announce_conditions','announce_wind',
  'attention_tones','persist','ptt_enabled','registration_enabled',
  'queue_courtesy','voice_id','streaming','rf_to_poc','poc_to_rf',
  'auto_punctuation','vad_filter','trust_cos_bit'
]);

const NUMBER_KEYS = new Set([
  'cwid_wpm','cwid_freq','cwid_amplitude',
  'cor_drop_hold','quiet_start','quiet_end','solar_offset',
  'end_silence_ms','end_silence_dtmf_ms','dtmf_grace_ms',
  'hits_to_begin','misses_to_end','min_off_frames',
  'freq','amplitude','max_messages',
  'time_skew','port','hw_rate','preemphasis_alpha',
  'cor_bit','ptt_bit','max_size_mb',
  'wyoming_port','ptt_priority',
  'priority','virtual_user_id','rf_bridge_group',
  'carrier_freq','scrambler_code','tx_level',
  'default_speed','cap_code','udp_base_port',
  'vad_threshold','vad_hold_ms',
  'center_freq','sample_rate_sdr','gain','squelch'
]);

/* Duration values — accept human-readable strings ("15m", "300s",
 * "500ms") that the daemon's parse_duration_ms / parse_duration_s
 * handles. Bare numbers still work (interpreted as ms by the _ms
 * parser, s by the _s parser); render as text with a placeholder
 * hint so the user isn't forced to think in milliseconds. */
const DURATION_KEYS = new Set([
  'tail_time','hang_time','timeout_time','cor_debounce','tx_delay','tx_tail',
  'relay_drain','cwid_interval','cwid_tail',
  'ani_window','login_timeout','inter_digit_timeout',
  'interval','timeout','duration','session_timeout',
  'poll_interval','reannounce_interval','fetch_interval',
  'max_capture','min_duration','max_duration','ptt_max_duration',
  'dial_timeout','inactivity_timeout','max_call_duration','vad_hold_ms'
]);

const PASSWORD_KEYS = new Set([
  'api_key','auth_token','auth_password','google_maps_api_key',
  'esl_password','poc_password'
]);

const SELECT_KEYS = {
  log_level: ['error','warn','info','debug'],
  cor_polarity: ['active_low','active_high'],
  min_severity: ['extreme','severe','moderate','minor'],
  engine: ['elevenlabs','wyoming'],
  mode: ['batch','streaming'],
  cwid_mode: ['always','on_call'],
  tone_display: ['ctcss','dcs','private'],
  quiet_mode: ['fixed','solar'],
  environment: ['open','suburban','forest','urban'],
  modulation: ['fsk','baseband'],
  default_speed: ['512','1200','2400']
};

const READONLY_KEYS = new Set([
  'sample_rate','socket_path','pid_file','module_path','load',
  'tls_cert','tls_key','capture_device','playback_device','device',
  'static_dir','rrd_file'
]);

/* Duration values use human-readable format (5m, 300s, 500ms, etc.)
 * Bare numbers = milliseconds. Show the unit hint from the config. */
const UNIT_MAP = {
  cwid_freq:'Hz', freq:'Hz', hw_rate:'Hz',
  cwid_wpm:'WPM', cwid_amplitude:'0-32767',
  amplitude:'0-32767', tx_level:'0-100%',
  quiet_start:'hour 0-23', quiet_end:'hour 0-23',
  solar_offset:'minutes',
  max_capture:'seconds', max_messages:'',
  port:'', wyoming_port:'', ptt_priority:'',
  priority:'', virtual_user_id:'', rf_bridge_group:'',
  cor_bit:'', ptt_bit:'', max_size_mb:'MB',
  time_skew:'', preemphasis_alpha:'',
  scrambler_code:'1-8', carrier_freq:'Hz',
  cap_code:'', default_speed:'baud',
  center_freq:'MHz', sample_rate_sdr:'Hz', gain:'dB', squelch:'dB',
  vad_threshold:'', vad_hold_ms:'ms',
  udp_base_port:''
};

// ============================================================
// Auth — browser handles Basic Auth natively
// ============================================================
async function apiFetch(url, opts) {
  opts = opts || {};
  if (!opts.headers) opts.headers = {};
  if (opts.body && typeof opts.body === 'object') {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  opts.credentials = 'same-origin';
  const res = await fetch(url, opts);
  if (res.status === 403) {
    document.getElementById('config-grid').style.display = 'none';
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = 'auth_password must be set in kerchunk.conf';
    throw new Error('Forbidden');
  }
  return res;
}

// ============================================================
// Toast
// ============================================================
let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = 'toast'; }, 3000);
}

// ============================================================
// Label formatting
// ============================================================
function formatLabel(key) {
  // Special abbreviations
  const abbrevs = {
    cwid:'CWID', wpm:'WPM', dcs:'DCS', ctcss:'CTCSS', ani:'ANI', nws:'NWS',
    tts:'TTS', asr:'ASR', otp:'OTP', gpio:'GPIO', cdr:'CDR', hid:'HID', api:'API',
    tls:'TLS', pid:'PID', hz:'Hz', ms:'ms', mb:'MB', ip:'IP', ptt:'PTT',
    cor:'COR', tx:'TX', rx:'RX', sdr:'SDR', esl:'ESL', acl:'ACL',
    poc:'PoC', rf:'RF', llm:'LLM', vad:'VAD', udp:'UDP', sip:'SIP',
    aprs:'APRS', mdc:'MDC', fsk:'FSK'
  };

  var parts = key.split('_');
  var labeled = parts.map(function(p) {
    var lower = p.toLowerCase();
    if (abbrevs[lower]) return abbrevs[lower];
    return p.charAt(0).toUpperCase() + p.slice(1);
  });

  var label = labeled.join(' ');
  var unit = UNIT_MAP[key];
  if (unit) label += ' (' + unit + ')';
  return label;
}

// ============================================================
// Field type detection
// ============================================================
function getFieldType(key, section) {
  if (READONLY_KEYS.has(key)) return 'readonly';
  /* port/bind are readonly in [web] (requires restart) but editable elsewhere */
  if ((key === 'port' || key === 'bind') && section === 'web') return 'readonly';
  /* voice_id is a toggle in [repeater] (on/off for voice ID announcement)
   * but a text field in [tts] (ElevenLabs voice ID string) */
  if (key === 'voice_id') return section === 'tts' ? 'text' : 'toggle';
  /* enabled is a toggle everywhere */
  if (key === 'enabled') return 'toggle';
  if (TOGGLE_KEYS.has(key)) return 'toggle';
  if (NUMBER_KEYS.has(key)) return 'number';
  if (DURATION_KEYS.has(key)) return 'duration';
  if (PASSWORD_KEYS.has(key)) return 'password';
  if (SELECT_KEYS[key]) return 'select';
  return 'text';
}

// ============================================================
// Render
// ============================================================
var configData = {};

function renderConfig(data) {
  configData = data;
  var grid = document.getElementById('config-grid');
  grid.innerHTML = '';

  SECTION_ORDER.forEach(function(section) {
    var values = data[section];
    if (!values) return;

    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'section-' + section;

    var h2 = document.createElement('h2');
    h2.textContent = SECTION_NAMES[section] || section;
    card.appendChild(h2);

    var keys = Object.keys(values);
    keys.forEach(function(key) {
      var val = values[key];
      var type = getFieldType(key, section);
      var label = formatLabel(key);

      if (type === 'toggle') {
        var row = document.createElement('div');
        row.className = 'toggle-row';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = 'cfg-' + section + '-' + key;
        cb.dataset.section = section;
        cb.dataset.key = key;
        cb.checked = (val === 'on' || val === 'true' || val === '1' || val === true);
        var lbl = document.createElement('label');
        lbl.htmlFor = cb.id;
        lbl.textContent = label;
        row.appendChild(cb);
        row.appendChild(lbl);
        card.appendChild(row);
      } else {
        var group = document.createElement('div');
        group.className = 'form-group';
        var lbl = document.createElement('label');
        lbl.textContent = label;
        group.appendChild(lbl);

        if (type === 'select') {
          var sel = document.createElement('select');
          sel.id = 'cfg-' + section + '-' + key;
          sel.dataset.section = section;
          sel.dataset.key = key;
          SELECT_KEYS[key].forEach(function(opt) {
            var o = document.createElement('option');
            o.value = opt;
            o.textContent = opt;
            if (String(val) === opt) o.selected = true;
            sel.appendChild(o);
          });
          group.appendChild(sel);
        } else {
          var inp = document.createElement('input');
          inp.id = 'cfg-' + section + '-' + key;
          inp.dataset.section = section;
          inp.dataset.key = key;
          inp.value = (val !== null && val !== undefined) ? String(val) : '';

          if (type === 'number') {
            inp.type = 'number';
            inp.step = 'any';
          } else if (type === 'duration') {
            /* Free-form text so the daemon's duration parser can
             * accept "15m", "300s", "500ms" — bare numbers still
             * work (ms for *_ms fields, s for *_s fields). */
            inp.type = 'text';
            inp.placeholder = 'e.g. 15m, 300s, 500ms';
            inp.pattern = '^\\d+(\\.\\d+)?(ms|s|m|h)?$|^\\d+(h\\d+m?)?(\\d+m\\d+s?)?$';
          } else if (type === 'password') {
            inp.type = 'password';
          } else if (type === 'readonly') {
            inp.type = 'text';
            inp.disabled = true;
          } else {
            inp.type = 'text';
          }

          group.appendChild(inp);

          if (type === 'duration') {
            var note = document.createElement('div');
            note.className = 'field-note';
            note.textContent = 'Duration: 15m, 30s, 500ms (bare numbers = ms)';
            group.appendChild(note);
          }
          if (type === 'readonly') {
            var note = document.createElement('div');
            note.className = 'field-note';
            note.textContent = 'Restart required to change';
            group.appendChild(note);
          }
        }
        card.appendChild(group);
      }
    });

    // Save button
    var footer = document.createElement('div');
    footer.className = 'card-footer';
    var saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-green';
    saveBtn.textContent = 'Save & Reload';
    saveBtn.dataset.section = section;
    saveBtn.addEventListener('click', function() { saveSection(section); });
    footer.appendChild(saveBtn);
    card.appendChild(footer);

    grid.appendChild(card);
  });

  // Render any sections not in the predefined order
  Object.keys(data).forEach(function(section) {
    if (SECTION_ORDER.indexOf(section) === -1) {
      var values = data[section];
      var card = document.createElement('div');
      card.className = 'card';
      card.id = 'section-' + section;

      var h2 = document.createElement('h2');
      h2.textContent = SECTION_NAMES[section] || section;
      card.appendChild(h2);

      Object.keys(values).forEach(function(key) {
        var val = values[key];
        var type = getFieldType(key, section);
        var label = formatLabel(key);

        var group = document.createElement('div');
        group.className = 'form-group';
        var lbl = document.createElement('label');
        lbl.textContent = label;
        group.appendChild(lbl);

        var inp = document.createElement('input');
        inp.id = 'cfg-' + section + '-' + key;
        inp.dataset.section = section;
        inp.dataset.key = key;
        inp.type = 'text';
        inp.value = (val !== null && val !== undefined) ? String(val) : '';
        group.appendChild(inp);
        card.appendChild(group);
      });

      var footer = document.createElement('div');
      footer.className = 'card-footer';
      var saveBtn = document.createElement('button');
      saveBtn.className = 'btn btn-green';
      saveBtn.textContent = 'Save & Reload';
      saveBtn.dataset.section = section;
      saveBtn.addEventListener('click', function() { saveSection(section); });
      footer.appendChild(saveBtn);
      card.appendChild(footer);

      grid.appendChild(card);
    }
  });
}

// ============================================================
// Save
// ============================================================
async function saveSection(section) {
  var values = {};
  var inputs = document.querySelectorAll('[data-section="' + section + '"]');

  inputs.forEach(function(el) {
    if (el.tagName === 'BUTTON') return;
    var key = el.dataset.key;
    if (!key) return;
    if (el.disabled) return; // skip readonly fields

    if (el.type === 'checkbox') {
      values[key] = el.checked ? 'on' : 'off';
    } else {
      values[key] = el.value;
    }
  });

  try {
    var res = await apiFetch('/admin/api/config', {
      method: 'PUT',
      body: { section: section, values: values }
    });
    if (!res.ok) {
      var errText = await res.text();
      throw new Error(errText || 'Save failed');
    }
    showToast(SECTION_NAMES[section] + ' saved and reloaded', 'success');
    // Re-fetch config to refresh displayed values
    await loadConfig();
  } catch (e) {
    showToast('Failed to save: ' + e.message, 'error');
  }
}

// ============================================================
// Load config
// ============================================================
async function loadConfig() {
  try {
    var res = await apiFetch('/admin/api/config');
    var data = await res.json();
    renderConfig(data.sections || data);
  } catch (e) {
    if (e.message !== 'Forbidden' && e.message !== 'Unauthorized') {
      showToast('Failed to load config: ' + e.message, 'error');
    }
  }
}

// ============================================================
// Init ��� browser handles Basic Auth natively
// ============================================================
(async function init() {
  await loadConfig();
})();
</script>
</body>
</html>
