<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Kerchunk Register</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
        --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        --yellow: #d29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text); padding: 16px; max-width: 600px;
       margin: 0 auto; min-height: 100vh; }
header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
header h1 { font-size: 20px; }
.btn { padding: 5px 12px; border: 1px solid var(--border); background: var(--card);
       color: var(--text); border-radius: 5px; cursor: pointer; font-size: 12px;
       -webkit-tap-highlight-color: transparent; text-decoration: none; display: inline-block; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
        margin-bottom: 12px; }
.card h2 { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px;
           margin-bottom: 10px; }
.form-group { margin-bottom: 10px; }
.form-input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
              color: var(--text); border-radius: 5px; font-size: 14px; }
.form-input:focus { outline: none; border-color: var(--accent); }
.form-input::placeholder { color: var(--dim); }
.submit-btn { width: 100%; padding: 10px 20px; background: var(--accent); color: #000; border: none;
              border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 600;
              margin-top: 4px; }
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.5; cursor: default; }
.error { color: var(--red); font-size: 12px; margin-top: 6px; }
.cred-row { display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.cred-row:last-child { border-bottom: none; }
.cred-label { color: var(--dim); }
.cred-val { font-weight: 600; }
.cred-val.mono { font-family: 'SF Mono', Monaco, monospace; font-size: 22px; color: var(--accent); }
.save-msg { margin-top: 12px; padding: 8px 10px; border-left: 3px solid var(--yellow);
            background: rgba(210,153,34,0.08); border-radius: 0 3px 3px 0; font-size: 12px;
            color: var(--yellow); }
.ptt-link { display: inline-block; margin-top: 12px; }

@media (max-width: 600px) {
  body { padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  header h1 { font-size: 16px; }
  header nav { margin-left: 0; width: 100%; justify-content: stretch; }
  header nav .btn { flex: 1; text-align: center; min-height: 44px; display: flex;
                    align-items: center; justify-content: center; padding: 8px 6px; }
  .form-input { min-height: 44px; font-size: 16px; }
  .submit-btn { min-height: 44px; }
  .cred-val.mono { font-size: 28px; }
}
</style>
</head>
<body>
<header>
  <h1>Register</h1>
  <nav style="margin-left:auto;display:flex;gap:8px">
    <a href="index.html" class="btn">Public</a>
  </nav>
</header>

<!-- Registration Form -->
<div class="card" id="reg-section">
  <h2>Create Account</h2>
  <div class="form-group">
    <input type="text" id="reg-username" class="form-input" placeholder="username"
           autocomplete="username" autocapitalize="none" spellcheck="false">
  </div>
  <div class="form-group">
    <input type="text" id="reg-name" class="form-input" placeholder="Display name (optional)"
           autocomplete="name">
  </div>
  <div class="form-group">
    <input type="email" id="reg-email" class="form-input" placeholder="Email (optional)"
           autocomplete="email">
  </div>
  <div class="form-group">
    <input type="text" id="reg-callsign" class="form-input" placeholder="Callsign (optional)"
           oninput="this.value=this.value.toUpperCase()" maxlength="15" autocapitalize="characters">
  </div>
  <button id="reg-btn" class="submit-btn">Register</button>
  <div id="reg-error" class="error"></div>
</div>

<!-- Success Card -->
<div class="card" id="success-section" style="display:none">
  <h2>Registration Complete</h2>
  <div class="cred-row">
    <span class="cred-label">Username</span>
    <span class="cred-val" id="res-username"></span>
  </div>
  <div class="cred-row">
    <span class="cred-label">Display Name</span>
    <span class="cred-val" id="res-name"></span>
  </div>
  <div class="cred-row" id="res-callsign-row" style="display:none">
    <span class="cred-label">Callsign</span>
    <span class="cred-val" id="res-callsign"></span>
  </div>
  <div class="cred-row">
    <span class="cred-label">DTMF Login PIN</span>
    <span class="cred-val mono" id="res-pin"></span>
  </div>
  <div class="cred-row">
    <span class="cred-label">ANI</span>
    <span class="cred-val mono" id="res-ani"></span>
  </div>
  <div class="save-msg">Save your PIN and ANI -- you'll need the PIN to log in for PTT.</div>
  <a href="ptt.html" class="btn ptt-link">Go to PTT</a>
</div>

<script>
(function(){
'use strict';
const $ = (id) => document.getElementById(id);

/* Auto-lowercase and strip spaces from username */
$('reg-username').addEventListener('input', function() {
  const pos = this.selectionStart;
  const orig = this.value;
  const cleaned = orig.toLowerCase().replace(/\s/g, '');
  if (cleaned !== orig) {
    this.value = cleaned;
    const diff = orig.length - cleaned.length;
    this.setSelectionRange(pos - diff, pos - diff);
  }
});

/* Submit on Enter from any input */
['reg-username', 'reg-name', 'reg-email', 'reg-callsign'].forEach(function(id) {
  $(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') $('reg-btn').click();
  });
});

/* Register */
$('reg-btn').addEventListener('click', async function() {
  const username = $('reg-username').value.trim();
  const name = $('reg-name').value.trim();
  const email = $('reg-email').value.trim();
  const callsign = $('reg-callsign').value.trim().toUpperCase();

  $('reg-error').textContent = '';

  if (!username) {
    $('reg-error').textContent = 'Username is required';
    $('reg-username').focus();
    return;
  }

  if (/[^a-z0-9_\-]/.test(username)) {
    $('reg-error').textContent = 'Username must be lowercase letters, numbers, hyphens, or underscores';
    $('reg-username').focus();
    return;
  }

  $('reg-btn').disabled = true;
  $('reg-btn').textContent = 'Registering...';

  try {
    const body = { username: username };
    if (name) body.name = name;
    if (email) body.email = email;
    if (callsign) body.callsign = callsign;

    const resp = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      let msg = 'Registration failed';
      if (resp.status === 403) {
        msg = 'Registration disabled';
      } else if (resp.status === 409) {
        msg = 'Username already taken';
      } else {
        try {
          const err = await resp.json();
          if (err.error) msg = err.error;
        } catch(_) {}
      }
      $('reg-error').textContent = msg;
      $('reg-btn').disabled = false;
      $('reg-btn').textContent = 'Register';
      return;
    }

    const data = await resp.json();
    $('res-username').textContent = data.username;
    $('res-name').textContent = data.name || data.username;
    if (data.callsign) {
      $('res-callsign').textContent = data.callsign;
      $('res-callsign-row').style.display = '';
    }
    $('res-pin').textContent = data.dtmf_login;
    $('res-ani').textContent = data.ani;

    $('reg-section').style.display = 'none';
    $('success-section').style.display = 'block';
  } catch(err) {
    $('reg-error').textContent = 'Network error -- please try again';
    $('reg-btn').disabled = false;
    $('reg-btn').textContent = 'Register';
  }
});
})();
</script>
</body>
</html>
