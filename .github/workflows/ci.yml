name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev \
            libssl-dev librtlsdr-dev libasound2-dev \
            libfst-dev g++

      - name: Build and install libplcode
        run: |
          git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
          cd /tmp/libplcode
          autoreconf -fi
          ./configure
          make
          make check
          sudo make install
          sudo ldconfig

      - name: Build and install libnemo-normalize
        run: |
          git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
          cd /tmp/libnemo_normalize
          autoreconf -fi
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build kerchunk
        run: |
          autoreconf -fi
          ./configure
          make

      - name: Test
        run: make check
