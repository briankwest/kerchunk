name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev \
            libssl-dev librtlsdr-dev libasound2-dev \
            libcjson-dev \
            libfst-dev g++

      # All sibling libs track main here so kerchunk CI catches any
      # cross-repo breakage at the moment it lands. Release builds
      # pin tagged versions in release.yml separately.
      - name: Build and install libplcode (main)
        run: |
          git clone --depth 1 https://github.com/briankwest/libplcode.git /tmp/libplcode
          cd /tmp/libplcode
          autoreconf -fi
          ./configure
          make
          make check
          sudo make install
          sudo ldconfig

      - name: Build and install libnemo-normalize (main)
        run: |
          git clone --depth 1 https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
          cd /tmp/libnemo_normalize
          autoreconf -fi
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build and install libwyoming (main)
        run: |
          git clone --depth 1 https://github.com/briankwest/libwyoming.git /tmp/libwyoming
          cd /tmp/libwyoming
          autoreconf -fi
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build and install paging/PoC libs (main)
        run: |
          for lib in libpocsag libflex libaprs libpoc; do
            git clone --depth 1 https://github.com/briankwest/$lib.git /tmp/$lib
            (cd /tmp/$lib && autoreconf -fi && ./configure && make && sudo make install)
          done
          sudo ldconfig

      - name: Build kerchunk
        run: |
          autoreconf -fi
          ./configure
          make

      - name: Test
        run: make check
