name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and install libplcode
  libplcode:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install autotools
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Build and install libplcode
        run: |
          cd libplcode
          autoreconf -fi
          ./configure
          make
          make test
          sudo make install
          sudo ldconfig

      - name: Upload libplcode install
        uses: actions/upload-artifact@v5
        with:
          name: libplcode-install
          path: /usr/local/lib/libplcode*
          include-hidden-files: true

  # Build libnemo-normalize (requires OpenFst)
  libnemo-normalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool libfst-dev g++

      - name: Build and install libnemo-normalize
        run: |
          cd libnemo_normalize
          autoreconf -fi
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Upload libnemo install
        uses: actions/upload-artifact@v5
        with:
          name: libnemo-install
          path: /usr/local/lib/libnemo*
          include-hidden-files: true

  # Build and test kerchunk (depends on both libs)
  kerchunk:
    needs: [libplcode, libnemo-normalize]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev \
            libssl-dev librtlsdr-dev libasound2-dev \
            libfst-dev g++

      - name: Build and install libplcode
        run: |
          cd libplcode
          autoreconf -fi
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build and install libnemo-normalize
        run: |
          cd libnemo_normalize
          autoreconf -fi
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build kerchunk
        run: |
          autoreconf -fi
          ./configure
          make

      - name: Test
        run: make check
