name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            portaudio19-dev libcurl4-openssl-dev \
            libssl-dev librtlsdr-dev libasound2-dev

      - name: Build
        run: make all

      - name: Test
        run: make test
