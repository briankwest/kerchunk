name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build and test libplcode
  libplcode:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and test libplcode
        run: |
          cd libplcode
          make
          make test

  # Build libnemo-normalize (requires OpenFst)
  libnemo-normalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OpenFst
        run: sudo apt-get update && sudo apt-get install -y libfst-dev g++

      - name: Build libnemo-normalize
        run: |
          cd libnemo_normalize
          make CONDA_PREFIX=/usr libnemo_normalize.so

  # Build and test kerchunk (depends on both libs)
  kerchunk:
    needs: [libplcode, libnemo-normalize]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            portaudio19-dev libcurl4-openssl-dev \
            libssl-dev librtlsdr-dev libasound2-dev

      - name: Build
        run: make all

      - name: Test
        run: make test
