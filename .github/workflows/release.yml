name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-arm64-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build all .deb packages (arm64 Ubuntu)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          run: |
            cd /workspace
            apt-get update
            apt-get install -y \
              build-essential pkg-config devscripts debhelper fakeroot \
              autoconf automake libtool autoconf-archive \
              portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
              libasound2-dev libfst-dev g++

            cd libplcode && scripts/generate-changelog.sh "1.0.0" && dpkg-buildpackage -us -uc -b && dpkg -i ../libplcode-dev_*.deb && cd ..
            cd libnemo_normalize && scripts/generate-changelog.sh "1.0.0" && dpkg-buildpackage -us -uc -b && dpkg -i ../libnemo-normalize*.deb && cd ..
            scripts/generate-changelog.sh "$VERSION" && dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-arm64-ubuntu
          path: dist/*.deb

  build-arm64-debian13:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build all .deb packages (arm64 Debian 13)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: trixie
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          run: |
            cd /workspace
            apt-get update
            apt-get install -y \
              build-essential pkg-config devscripts debhelper fakeroot \
              autoconf automake libtool autoconf-archive \
              portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
              libasound2-dev libfst-dev g++

            cd libplcode && scripts/generate-changelog.sh "1.0.0" && dpkg-buildpackage -us -uc -b && dpkg -i ../libplcode-dev_*.deb && cd ..
            cd libnemo_normalize && scripts/generate-changelog.sh "1.0.0" && dpkg-buildpackage -us -uc -b && dpkg -i ../libnemo-normalize*.deb && cd ..
            scripts/generate-changelog.sh "$VERSION" && dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-arm64-debian13
          path: dist/*.deb

  build-amd64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config devscripts debhelper fakeroot lintian \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
            libasound2-dev libfst-dev g++

      - name: Build libplcode-dev .deb
        run: |
          cd libplcode
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          sudo dpkg -i ../libplcode-dev_*.deb

      - name: Build libnemo-normalize .deb
        run: |
          cd libnemo_normalize
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          sudo dpkg -i ../libnemo-normalize*.deb

      - name: Build kerchunk .deb
        run: |
          scripts/generate-changelog.sh "${{ steps.version.outputs.VERSION }}"
          dpkg-buildpackage -us -uc -b

      - name: Collect amd64 artifacts
        run: |
          mkdir -p dist
          cp ../*.deb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload amd64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-amd64
          path: dist/*.deb

  create-release:
    needs: [build-arm64-ubuntu, build-arm64-debian13, build-amd64]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          cat > release_notes.md << HEADER
          ## kerchunkd ${GITHUB_REF_NAME}

          GMRS/HAM repeater controller daemon.

          ### Changes
          HEADER

          git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> release_notes.md

          cat >> release_notes.md << 'FOOTER'

          ### Installation (Raspberry Pi / arm64)

          ```bash
          sudo dpkg -i libplcode-dev_*_arm64.deb
          sudo dpkg -i libnemo-normalize-data_*_all.deb libnemo-normalize_*_arm64.deb
          sudo dpkg -i kerchunk_*_arm64.deb
          sudo apt-get -f install

          sudo vi /etc/kerchunk/kerchunk.conf
          sudo systemctl start kerchunkd
          ```

          ### Packages
          FOOTER

          echo "" >> release_notes.md
          echo "| File | Size |" >> release_notes.md
          echo "|------|------|" >> release_notes.md
          for f in dist/*.deb; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            echo "| \`${name}\` | ${size} |" >> release_notes.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: dist/*.deb
          draft: false
          prerelease: false
