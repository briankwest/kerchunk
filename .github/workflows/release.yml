name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-arm64-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build all .deb packages (arm64 Ubuntu 24.04)
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          run: |
            cd /workspace
            apt-get update
            apt-get install -y \
              build-essential pkg-config devscripts debhelper fakeroot \
              autoconf automake libtool autoconf-archive \
              portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
              libasound2-dev libfst-dev g++ git

            git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
            cd /tmp/libplcode && autoreconf -fi && ./configure && make -j4
            scripts/generate-changelog.sh "1.0.0"
            dpkg-buildpackage -us -uc -b && dpkg -i ../libplcode-dev_*.deb

            git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
            cd /tmp/libnemo_normalize && autoreconf -fi && ./configure && make -j4
            scripts/generate-changelog.sh "1.0.0"
            dpkg-buildpackage -us -uc -b
            dpkg -i ../libnemo-normalize_*.deb ../libnemo-normalize-data_*.deb 2>/dev/null || true

            cd /workspace
            dpkg-buildpackage -us -uc -b

            mkdir -p /workspace/dist
            cp ../*.deb ../*.ddeb /workspace/dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-arm64-ubuntu
          path: dist/*

  build-arm64-debian12:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build all .deb packages (arm64 Debian 12)
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: bookworm
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          run: |
            cd /workspace
            apt-get update
            apt-get install -y \
              build-essential pkg-config devscripts debhelper fakeroot \
              autoconf automake libtool autoconf-archive \
              portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
              libasound2-dev libfst-dev g++ git

            git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
            cd /tmp/libplcode && autoreconf -fi && ./configure && make -j4
            scripts/generate-changelog.sh "1.0.0"
            dpkg-buildpackage -us -uc -b && dpkg -i ../libplcode-dev_*.deb

            git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
            cd /tmp/libnemo_normalize && autoreconf -fi && ./configure && make -j4
            scripts/generate-changelog.sh "1.0.0"
            dpkg-buildpackage -us -uc -b
            dpkg -i ../libnemo-normalize_*.deb ../libnemo-normalize-data_*.deb 2>/dev/null || true

            cd /workspace
            dpkg-buildpackage -us -uc -b

            mkdir -p /workspace/dist
            cp ../*.deb ../*.ddeb /workspace/dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-arm64-debian12
          path: dist/*

  build-arm64-debian13:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build all .deb packages (arm64 Debian 13)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            debian:trixie bash -c '
              cd /workspace
              apt-get update
              apt-get install -y \
                build-essential pkg-config devscripts debhelper fakeroot \
                autoconf automake libtool autoconf-archive \
                portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
                libasound2-dev libfst-dev g++ git

              git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
              cd /tmp/libplcode && autoreconf -fi && ./configure && make -j4
              scripts/generate-changelog.sh "1.0.0"
              dpkg-buildpackage -us -uc -b && dpkg -i ../libplcode-dev_*.deb

              git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
              cd /tmp/libnemo_normalize && autoreconf -fi && ./configure && make -j4
              scripts/generate-changelog.sh "1.0.0"
              dpkg-buildpackage -us -uc -b
              dpkg -i ../libnemo-normalize_*.deb ../libnemo-normalize-data_*.deb 2>/dev/null || true

              cd /workspace
              dpkg-buildpackage -us -uc -b

              mkdir -p /workspace/dist
              cp ../*.deb ../*.ddeb /workspace/dist/ 2>/dev/null || true
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-arm64-debian13
          path: dist/*

  build-amd64-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config devscripts debhelper fakeroot lintian \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
            libasound2-dev libfst-dev g++

      - name: Build and install libplcode
        run: |
          git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
          cd /tmp/libplcode
          autoreconf -fi && ./configure && make -j4
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          sudo dpkg -i ../libplcode-dev_*.deb

      - name: Build and install libnemo-normalize
        run: |
          git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
          cd /tmp/libnemo_normalize
          autoreconf -fi && ./configure && make -j4
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          sudo dpkg -i ../libnemo-normalize_*.deb ../libnemo-normalize-data_*.deb 2>/dev/null || true

      - name: Build kerchunk .deb
        run: |
          scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64-ubuntu
          path: dist/*

  build-amd64-debian12:
    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt-get install -y \
            build-essential pkg-config devscripts debhelper fakeroot \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
            libasound2-dev libfst-dev g++

      - name: Build and install libplcode
        run: |
          git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
          cd /tmp/libplcode
          autoreconf -fi && ./configure && make -j4
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          dpkg -i ../libplcode-dev_*.deb

      - name: Build and install libnemo-normalize
        run: |
          git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
          cd /tmp/libnemo_normalize
          autoreconf -fi && ./configure && make -j4
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          dpkg -i ../libnemo-normalize_*.deb ../libnemo-normalize-data_*.deb 2>/dev/null || true

      - name: Build kerchunk .deb
        run: |
          scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64-debian12
          path: dist/*

  build-amd64-debian13:
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt-get install -y \
            build-essential pkg-config devscripts debhelper fakeroot \
            autoconf automake libtool autoconf-archive \
            portaudio19-dev libcurl4-openssl-dev libssl-dev librtlsdr-dev \
            libasound2-dev libfst-dev g++

      - name: Build and install libplcode
        run: |
          git clone https://github.com/briankwest/libplcode.git /tmp/libplcode
          cd /tmp/libplcode
          autoreconf -fi && ./configure && make -j4
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          dpkg -i ../libplcode-dev_*.deb

      - name: Build and install libnemo-normalize
        run: |
          git clone https://github.com/briankwest/libnemo_normalize.git /tmp/libnemo_normalize
          cd /tmp/libnemo_normalize
          autoreconf -fi && ./configure && make -j4
          scripts/generate-changelog.sh "1.0.0"
          dpkg-buildpackage -us -uc -b
          dpkg -i ../libnemo-normalize_*.deb ../libnemo-normalize-data_*.deb 2>/dev/null || true

      - name: Build kerchunk .deb
        run: |
          scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64-debian13
          path: dist/*

  create-release:
    needs: [build-arm64-ubuntu, build-arm64-debian12, build-arm64-debian13, build-amd64-ubuntu, build-amd64-debian12, build-amd64-debian13]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten and rename with distro suffix
        run: |
          mkdir -p dist
          for dir in artifacts/debs-*/; do
            distro=$(basename "$dir" | sed 's/debs-//')
            for f in "$dir"*.deb "$dir"*.ddeb; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              ext="${base##*.}"
              name="${base%.*}"
              cp "$f" "dist/${name}~${distro}.${ext}"
            done
          done
          ls -lh dist/

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          [ -z "$PREV_TAG" ] && PREV_TAG=$(git rev-list --max-parents=0 HEAD)

          echo "## kerchunkd ${GITHUB_REF_NAME}" > notes.md
          echo "" >> notes.md
          echo "GMRS/HAM repeater controller daemon." >> notes.md
          echo "" >> notes.md
          echo "### Changes" >> notes.md

          git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> notes.md

          cat >> notes.md << 'FOOTER'

          ### Installation (Raspberry Pi / arm64)

          ```bash
          sudo dpkg -i libplcode-dev_*~arm64-ubuntu.deb
          sudo dpkg -i libnemo-normalize-data_*~arm64-ubuntu.deb libnemo-normalize_*~arm64-ubuntu.deb
          sudo dpkg -i kerchunk_*~arm64-ubuntu.deb
          sudo apt-get -f install
          sudo vi /etc/kerchunk/kerchunk.conf
          sudo systemctl start kerchunkd
          ```

          ### Build Matrix

          | Architecture | OS |
          |-|-|
          | amd64 | Ubuntu 24.04 |
          | amd64 | Debian 12 (Bookworm) |
          | amd64 | Debian 13 (Trixie) |
          | arm64 | Ubuntu 24.04 |
          | arm64 | Debian 12 (Bookworm) |
          | arm64 | Debian 13 (Trixie) |

          ### Packages
          FOOTER

          echo "" >> notes.md
          echo "| File | Size |" >> notes.md
          echo "|------|------|" >> notes.md
          for f in dist/*.deb dist/*.ddeb; do
            [ -f "$f" ] || continue
            echo "| \`$(basename $f)\` | $(du -h "$f" | cut -f1) |" >> notes.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            dist/*.deb
            dist/*.ddeb
          draft: false
          prerelease: false
